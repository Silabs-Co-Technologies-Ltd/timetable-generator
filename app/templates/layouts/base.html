<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Automated Timetable Generator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <h1>Automated Timetable Generator</h1>
    <nav>
      <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
      <a href="{{ url_for('main.lecturers') }}">Lecturers</a>
      <a href="{{ url_for('main.rooms') }}">Rooms</a>
      <a href="{{ url_for('main.timeslots') }}">Timeslots</a>
      <a href="{{ url_for('main.courses') }}">Courses</a>
    </nav>
  </header>
  <main class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <p class="flash {{ category }}">{{ message }}</p>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
