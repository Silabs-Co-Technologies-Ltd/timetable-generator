{% extends "layouts/base.html" %}{% block content %}
<h2>User accounts</h2>
<form method="post" class="form-grid">
  <input name="name" placeholder="Full name" required>
  <input name="email" type="email" placeholder="Email" required>
  <input name="password" type="password" placeholder="Temporary password" minlength="8" required>
  <select name="role" required>{% for role in roles %}<option value="{{ role }}">{{ role|title }}</option>{% endfor %}</select>
  <label><input name="is_active" type="checkbox" checked> Active</label>
  <button>Create user</button>
</form>
<table><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr>{% for user in users %}<tr><td>{{ user.name }}</td><td>{{ user.email }}</td><td>{{ user.role|title }}</td><td>{{ 'Active' if user.is_active else 'Inactive' }}</td></tr>{% endfor %}</table>
{% endblock %}
