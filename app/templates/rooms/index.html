{% extends "layouts/base.html" %}{% block content %}
<h2>Rooms</h2>
<form method="post" class="form-grid"><input name="code" placeholder="Room code" required><input name="capacity" type="number" min="1" placeholder="Capacity" required><label><input name="has_projection" type="checkbox"> Projection</label><button>Save new room</button></form>
<table><tr><th>Code</th><th>Capacity</th><th>Projection</th><th>Admin actions</th></tr>{% for room in rooms %}<tr><form method="post"><input type="hidden" name="room_id" value="{{ room.id }}"><td><input name="code" value="{{ room.code }}" required></td><td><input name="capacity" type="number" min="1" value="{{ room.capacity }}" required></td><td><label><input name="has_projection" type="checkbox" {% if room.has_projection %}checked{% endif %}> Projection</label></td><td><button>Update</button></form><form method="post" action="{{ url_for('main.delete_room', room_id=room.id) }}" class="inline-form"><button type="submit">Delete</button></form></td></tr>{% endfor %}</table>
{% endblock %}
